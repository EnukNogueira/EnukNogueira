<svg width="700" height="90" viewBox="0 0 700 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&amp;display=swap');
      text {
        font-family: 'Courier Prime', 'Courier New', monospace;
        text-anchor: middle;
      }
      .code { font-size: 24px; font-weight: 700; fill: #E05252; }

      .line1 { animation: type1 9s linear infinite; }
      @keyframes type1 {
        0%        { clip-path: inset(0 100% 0 0); opacity: 1; }
        2%        { clip-path: inset(0 95% 0 0);  opacity: 1; }
        38%       { clip-path: inset(0 0% 0 0);   opacity: 1; }
        46%       { clip-path: inset(0 0% 0 0);   opacity: 1; }
        50%       { opacity: 0; }
        51%, 100% { clip-path: inset(0 100% 0 0); opacity: 0; }
      }

      .line2 { animation: type2 9s linear infinite; }
      @keyframes type2 {
        0%, 50%   { clip-path: inset(0 100% 0 0); opacity: 0; }
        52%       { clip-path: inset(0 100% 0 0); opacity: 1; }
        54%       { clip-path: inset(0 95% 0 0);  opacity: 1; }
        88%       { clip-path: inset(0 0% 0 0);   opacity: 1; }
        96%       { clip-path: inset(0 0% 0 0);   opacity: 1; }
        100%      { opacity: 0; }
      }

      .cursor {
        font-size: 24px;
        fill: #E05252;
        text-anchor: middle;
        animation: blink 0.8s step-end infinite;
      }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    </style>
  </defs>

  <rect width="700" height="90" fill="none"/>

  <text class="code line1" x="350" y="38">print("Engenheiro de Dados")</text>
  <text class="code line2" x="350" y="72">Python  |  SQL  |  Pipelines</text>
  <text class="cursor"     x="490" y="72">_</text>
</svg>

<svg width="720" height="100" viewBox="0 0 720 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@700&amp;display=swap');
      text { font-family: 'Courier Prime', 'Courier New', monospace; text-anchor: middle; }

      .code { font-size: 21px; font-weight: 700; fill: #E05252; }

      .line1 { animation: type1 12s linear infinite; }
      @keyframes type1 {
        0%        { clip-path: inset(0 100% 0 0); opacity:1; }
        3%        { clip-path: inset(0 92% 0 0);  opacity:1; }
        40%       { clip-path: inset(0 0% 0 0);   opacity:1; }
        46%       { clip-path: inset(0 0% 0 0);   opacity:1; }
        50%       { opacity:0; }
        51%,100%  { clip-path: inset(0 100% 0 0); opacity:0; }
      }

      .line2 { animation: type2 12s linear infinite; }
      @keyframes type2 {
        0%,50%    { clip-path: inset(0 100% 0 0); opacity:0; }
        52%       { clip-path: inset(0 100% 0 0); opacity:1; }
        55%       { clip-path: inset(0 92% 0 0);  opacity:1; }
        90%       { clip-path: inset(0 0% 0 0);   opacity:1; }
        96%       { clip-path: inset(0 0% 0 0);   opacity:1; }
        100%      { opacity:0; }
      }

      .cursor {
        font-size:21px; fill:#E05252; text-anchor:middle;
        animation: blink 0.8s step-end infinite;
      }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

      /* linha decorativa pulsante */
      .bar {
        animation: pulse 3s ease-in-out infinite;
      }
      @keyframes pulse {
        0%   { transform: scaleX(0.15); opacity: 0; }
        30%  { transform: scaleX(1);    opacity: 1; }
        70%  { transform: scaleX(1);    opacity: 1; }
        100% { transform: scaleX(0.15); opacity: 0; }
      }
    </style>
  </defs>

  <rect width="720" height="100" fill="none"/>

  <text class="code line1" x="360" y="34">Engenharia de Dados | Python &amp; SQL</text>
  <text class="code line2" x="360" y="34">IA &amp; Automação | Java Backend</text>
  <text class="cursor"     x="530" y="34">_</text>

  <!-- linha pulsante abaixo do texto -->
  <rect class="bar"
    x="160" y="46"
    width="400" height="2"
    rx="1"
    fill="#E05252"
    style="transform-origin: 360px 47px;"
  />

  <!-- dois pontos laterais que aparecem junto com a linha -->
  <circle cx="155" cy="47" r="3" fill="#E05252" style="animation: pulse 3s ease-in-out infinite;" />
  <circle cx="565" cy="47" r="3" fill="#E05252" style="animation: pulse 3s ease-in-out infinite;" />
</svg>
